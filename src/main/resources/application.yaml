spring:
  application:
    name: rtns

  datasource:
    url: jdbc:mysql://localhost:3306/rtns_db   # replace with Cloud SQL host/db name
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
